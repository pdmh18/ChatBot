
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build: ./server
    ports:
      - "5000:8080"
    environment:
      - ConnectionStrings__Default=Host=db;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}
      - JwtSettings__SecretKey=${JWT_SECRET}
      - AiServer__BaseUrl=${AI_SERVER_URL}
    depends_on:
      - db
      - ai_server

  ai_server:
    build: ./ai_server
    ports:
      - "8000:8000"
    env_file:
      - ./ai_server/.env

  client:
    build: ./client
    ports:
      - "3000:3000"
    depends_on:
      - server

volumes:
  pgdata: